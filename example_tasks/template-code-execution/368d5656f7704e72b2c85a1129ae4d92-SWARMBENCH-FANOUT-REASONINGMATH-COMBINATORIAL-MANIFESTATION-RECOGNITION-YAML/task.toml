# =============================================================================
# Oracle-shortcut documentation (QD-02 check 9 justification).
#
# instruction.md prescribes that the SwarmBench AGENT must read each handbook
# entry's natural-language description, recognise the underlying combinatorial
# family, and evaluate the family's closed-form expression at the supplied
# parameters to derive each integer count. The oracle reference solver under
# solution/solve.sh is NOT an agent; it is the trainer-shipped gold solver
# that Harbor invokes only to round-trip the verifier pipeline (file path,
# YAML mapping shape, per-handle integer-equality scoring, reward-write path,
# structural-failure handling) and confirm it reports reward = 1.000000 on a
# known-good worksheet. The oracle is therefore allowed — and expected — to
# short-circuit the family-recognition-and-evaluation work by copying the
# trainer-curated ground-truth YAML from the private solution/oracle.yaml file
# (a file the agent never sees: it lives under /task/solution/ which Harbor
# mounts only for the oracle invocation, never for the single- or multi-agent
# container). Performing actual family recognition and closed-form evaluation
# inside solve.sh would defeat the purpose of the oracle, which by construction
# must agree bit-for-bit with the verifier's ground truth and the only source
# of that ground truth on this task is the trainer-curated oracle.yaml that
# was generated when the corpus was assembled. The instruction.md derivation
# requirement applies to the AGENT, not to the oracle; the oracle is a
# verifier-pipeline integrity check, not a competitor in the benchmark. This
# is the standard SwarmBench oracle-shortcut convention for verifier_type
# = "executable" tasks.
# =============================================================================

[task]
name = "swarmbench/368d5656f7704e72b2c85a1129ae4d92-SWARMBENCH-FANOUT-REASONINGMATH-COMBINATORIAL-MANIFESTATION-RECOGNITION-YAML"
description = "Read thirty-six combinatorial counting questions paraphrased from canonical references, recognise the underlying combinatorial family of each question (Catalan, Motzkin, Bell, large Schroder, Narayana, or unrestricted-partition function, interleaved across the handles), evaluate the family's closed form at the supplied index, and commit the integer counts to a YAML mapping worksheet at /logs/agent/integer_counts.yaml. Reward = fraction of handles whose committed integer equals the gold integer."

[metadata]
verifier_type = "executable"
domain = "reasoning-math"
coordination_pattern = "fan-out-synthesize"
human_solving_hours_estimate = 10
human_solving_hours_justification = """A strong human solver — a working enumerative-combinatorics specialist (e.g. a graduate teaching assistant for Stanley's EC course, or an active OEIS contributor) — finishes the thirty-six manifestation-recognition handbook in roughly ten hours of focused work. Breakdown by phase: Reading and recognition dominates the per-handle cost. Each handle's prose is one or two sentences (roughly 60-90 words); the solver reads the prose (about 30 seconds), parses the explicit set-up vocabulary (about 30 seconds), maps the set-up to its canonical combinatorial family (about 60 seconds for the canonical-by-the-book manifestations like Dyck paths and set partitions, about 180 seconds for the near-Catalan distractors that distinguish non-crossing-vs-non-nesting partitions, two-step-vs-three-step lattice paths, and Dyck-with-peak-count-vs-Dyck-without-peak-count), and writes down the family identification (about 30 seconds). Per-handle recognition wall-clock median across the thirty-six handles is roughly 240 seconds. Total recognition wall-clock = 36 * 240 / 60 = 144 minutes = 2.4 hours. Closed-form evaluation per handle is the second-largest cost: the solver evaluates the recognised family at the supplied evaluation index using sympy or by hand for the small-index handles (Catalan and Motzkin handles at small index can be done by hand from the standard formulas; Bell at index ten requires the recursive Stirling-second-kind formula or memoised Touchard recursion; partition p(n) at indices in the thirty-to-fifty range requires the Euler pentagonal-number recursion or sympy.npartitions for exact arithmetic; Narayana at given (n, k) requires the explicit binomial-product formula divided by n; large Schroder requires the explicit recursion). Per-handle evaluation wall-clock median is roughly 180 seconds, totalling 36 * 180 / 60 = 108 minutes = 1.8 hours. Cross-checking each derived integer count against the family's published OEIS entry for the evaluation index (one quick lookup per handle, requiring offline access to a printed OEIS slice or a local mirror because the runtime is offline) adds about 30 seconds per handle, totalling 36 * 30 / 60 = 18 minutes = 0.3 hours. Sanity-checking the eight handles most prone to slip (non-crossing-vs-non-nesting confusion, two-step-vs-three-step lattice path confusion, Dyck-peak-count off-by-one, Schroder small-vs-large confusion) adds about 5 minutes per such handle, totalling 8 * 5 / 60 = 0.67 hours. Writing the final YAML worksheet with thirty-six mapping lines in handle-ascending order and validating the worksheet schema by re-parsing under PyYAML adds about 10 minutes (0.17 hours). Reserve for handling the two-index Narayana handles (where the prose specifies both the semilength n and the peak count k, and the closed-form is N(n, k) = (1/n) C(n, k-1) C(n, k)), the handful of partition handles where the evaluation index sits in the high-thirties or forties magnitude band, and one full pass of independent re-derivation on the eight most slip-prone handles to catch a wrong family identification before it lands in the final worksheet, adds about 4.7 hours. Grand total = 2.4 + 1.8 + 0.3 + 0.67 + 0.17 + 4.7 = approximately 10.04 hours, rounded to 10 hours."""
estimated_sub_agents = 7
input_token_estimate = 7500
why_multi_agent = """A single agent must keep all thirty-six manifestation paraphrases live in one context window. Each handle requires five distinct reasoning sub-steps that do not factor across handles: READ the prose carefully (the prose is intentionally paraphrased so that the family is not named, and the near-Catalan distractors force the agent to distinguish "non-crossing" from "non-nesting", "two-step lattice path" from "three-step lattice path", "Dyck of given length" from "Dyck of given semilength with given peak count", and so on); RECOGNISE the underlying combinatorial family from the prose (one of six canonical families: Catalan, Motzkin, Bell, large Schroder, Narayana, unrestricted-partition function); LOAD the family's closed-form expression in working context (the six families have six distinct closed-forms — Catalan via central binomial divided by n+1, Motzkin via binomial-Catalan sum, Bell via Stirling-second-kind sum or Touchard recursion, large Schroder via the explicit recursion or via the central Delannoy formula, Narayana via the explicit binomial product divided by n, partition function via Euler pentagonal-number recursion or sympy's npartitions); EVALUATE the closed-form at the supplied evaluation index (and, for Narayana handles, at the supplied auxiliary peak-count index) using sympy's exact-arithmetic primitives so that no precision is lost on the multi-digit gold counts; WRITE the recognised integer to the worksheet mapping line keyed on the handle. Thirty-six handles times five sub-steps gives one hundred and eighty distinct reasoning operations a single agent must execute in one context, and the scorer awards credit on strict per-handle integer equality, so a single misclassification on any one handle drops that handle's contribution to zero. The named single-agent failure mode is three-fold: (a) recognition-collapse under context pressure — the agent reads all thirty-six paraphrases sequentially and the later handles' family recognitions get short-circuited by the agent's drift toward defaulting to "Catalan" (the most-recognised family) on borderline phrasings; (b) closed-form-confusion at evaluation time — the agent recognises the family correctly but loses the closed-form's exact formula in working memory, particularly for the two-index Narayana handles and the recursive Bell handles; and (c) evaluation-arithmetic slip — the agent evaluates the closed-form by mental arithmetic instead of via sympy and slips on the multi-digit gold counts where the gold magnitude reaches into the seven-digit range. Under the strict per-handle scorer these three failure modes drive single-agent reward into the 0.20-to-0.45 band on a thirty-six-handle worksheet with six interleaved canonical families. The fan-out-synthesize coordination pattern splits the worksheet along the natural sequential-ordinal axis into six worker sub-agents, each worker owning exactly six contiguous handles (one-sixth the single-agent recognition-and-evaluation pressure). The thirty-six manifestations are deliberately interleaved at corpus-build time so that every block of six contiguous handles spans all six canonical families exactly once: ordinals 1-6 carry one entry from each of Catalan/Motzkin/Bell/large-Schroder/Narayana/partition-function, ordinals 7-12 carry the second entry from each in the same order, and so on through ordinals 31-36. The interleaving ensures every worker sees the full six-family workload at one-sixth the volume; no worker can shortcut by specialising to a single family. Each worker has the per-prompt compute envelope to read all six paraphrases carefully, perform recognition under low context pressure, and evaluate each closed-form via sympy's exact-arithmetic primitives — these per-worker behaviours are documented in instruction.md (the shared task-wide methodology that both single- and multi-agent runs see); the decomposition contract itself prescribes only the dispatch topology and output completeness, leaving the per-handle methodology to instruction.md. The synthesizer sub-agent never re-recognises any handle or re-evaluates any integer; it only unions the six typed six-key worker dicts into the thirty-six-entry YAML worksheet at /logs/agent/integer_counts.yaml in any handle order (the scorer reorders by handle at parse time). The thirty-six handles are mutually independent (no recognition or evaluation flows from one handle to another), so partitioning along the sequential-ordinal axis loses nothing at worker boundaries. Total: 6 workers + 1 synthesizer = 7 Agent calls; the workers fan out in a single parallel wave well inside the 300-second agent budget."""
reference_link = "https://oeis.org/A000108"

[agent]
timeout_sec = 300

[verifier]
timeout_sec = 300

[environment]
cpus = 2
memory_mb = 4096
build_timeout_sec = 600
