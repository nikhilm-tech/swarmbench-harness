# =============================================================================
# Oracle-shortcut documentation (QD-02 check 9 justification).
#
# instruction.md prescribes that the SwarmBench AGENT compute four tropical
# invariants (eigenvalue floor, Kleene-star finite-entry count, cyclicity,
# critical-arc count) per matrix from first principles. The oracle reference
# solver under solution/solve.sh is NOT an agent; it is the trainer-shipped
# gold solver that Harbor invokes only to round-trip the verifier pipeline
# (deliverable path, JSON shape, per-atom integer-equality scoring,
# structural-failure handling) and confirm it reports reward = 1.000000 on
# a known-good fingerprint table. The oracle short-circuits the computation
# by copying the trainer-curated ground-truth JSON from solution/oracle.json
# (a file the agent never sees: it lives under /task/solution/ which Harbor
# mounts only for the oracle invocation). Standard SwarmBench oracle-shortcut
# convention for verifier_type = "executable" tasks.
# =============================================================================

[task]
name = "swarmbench/98e6ef5d05f73457c3894d91aedb423c-SWARMBENCH-MAPREDUCE-REASONINGMATH-TROPICAL-MATRIX-FIXPOINT-FINGERPRINT"
description = "Compute a four-tuple per-matrix fingerprint (floor of the max cycle mean, Kleene-star finite-entry count, cyclicity, critical-arc count) for each of 24 integer matrices over the min-plus tropical semiring, plus a three-family rollup partitioned by primitive / reducible / near-circulant structure. Reward = valid bare-int atoms / 108 against a sealed oracle, with strict type, interval, and exact-equality checks. Deliverable: /logs/agent/tropical_fingerprint.json."

[metadata]
verifier_type = "executable"
domain = "reasoning-math"
coordination_pattern = "map-reduce"
human_solving_hours_estimate = 9
human_solving_hours_justification = """A strong human solver — a working tropical-algebra or max-plus-control practitioner with hands-on experience in Karp's cycle-mean algorithm, Floyd-Warshall over the min-plus semiring, and elementary-circuit enumeration via Johnson's or Bron-Kerbosch on the critical subgraph — finishes the 108-atom fingerprint sweep over the 24-matrix corpus in roughly nine hours of focused work. Breakdown by phase: (a) Reading and matrix ingestion (24 records: read the JSONL line, parse the 'inf' string into a sentinel, decide the structural family from the id token, and assemble the n-by-n integer matrix in the row/column order given): at a per-record median of half a minute, totals 24 * 0.5 = 12 minutes = 0.20 hours. (b) Eigenvalue column (24 matrices: Karp's cycle-mean algorithm via n+1 tropical matrix powers, floor extraction with exact rational arithmetic since arc weights are integers and cycle lengths are at most n; cross-check by independent shortest-path-based negative-cycle detection on the rescaled matrix): at a per-matrix median of six minutes, totals 24 * 6 = 144 minutes = 2.40 hours. (c) Closure column (24 matrices: Floyd-Warshall variant over min-plus to assemble the Kleene star at convergence, count finite entries with the +inf sentinel discipline; cross-check via tropical matrix-power exponentiation to depth 2n-1): at a per-matrix median of five minutes, totals 24 * 5 = 120 minutes = 2.00 hours. (d) Cyclicity column (24 matrices: rescale by the eigenvalue, extract the support of zero-weight arcs participating in zero-weight cycles via Tarjan SCC + walk-back, enumerate elementary circuits via Johnson's algorithm on the critical subgraph, take gcd of circuit lengths with the acyclic-G sentinel discipline): at a per-matrix median of nine minutes, totals 24 * 9 = 216 minutes = 3.60 hours. (e) Critical-arc count column (24 matrices: already in hand from the cyclicity column's critical subgraph extraction; count its arc list): at a per-matrix median of half a minute, totals 24 * 0.5 = 12 minutes = 0.20 hours. (f) Family rollup (24 fingerprints already in hand; partition by family token, compute count, sum_lambda_floor, max_kleene_finite_count, sum_critical_arc_count per family): about 18 minutes (0.30 hours). (g) Cross-validation pass and JSON shape audit (re-derive the eigenvalue and critical-arc count on the four highest-risk matrices — the NCC family near-circulant perturbations where Karp's algorithm produces a one-off without the integer-floor snap discipline — and audit the final per-matrix four-element array ordering and the rollup three-key ordering against instruction.md §4): about 18 minutes (0.30 hours). Grand total = 0.20 + 2.40 + 2.00 + 3.60 + 0.20 + 0.30 + 0.30 = approximately 9.00 hours."""
estimated_sub_agents = 5
input_token_estimate = 6000
why_multi_agent = """A single agent must hold all 24 tropical-semiring matrices in one context window, recognise each operator's structural family from its id token, then switch reasoning mode between four structurally distinct fingerprint facets on every matrix — eigenvalue extraction by Karp's cycle-mean algorithm with an exact integer-floor snap on a rational mean; Kleene-star closure by Floyd-Warshall over the min-plus semiring with a +inf-sentinel discipline; cyclicity by gcd over elementary circuits of the critical subgraph extracted from the rescaled matrix; critical-arc count by direct enumeration on the same critical subgraph — and finally perform a separate per-family aggregation pass over the assembled fingerprints. Four per-matrix atoms across 24 matrices gives 96 inner atoms, plus four per-family atoms across three families gives 12 outer atoms, total 108 distinct integer atoms per trial — each graded under strict bare-integer equality, so a single rescale-by-eigenvalue error costs both the cyclicity slot and the critical-arc-count slot on that matrix at once and a wrong family token cascades through all four rollup columns of that family. The single-agent failure modes on this profile are four-fold: (1) integer-floor snap drift — Karp's algorithm produces the cycle mean as a rational p/q where q is the length of the optimal cycle, and a single agent racing through 24 matrices snaps the floor from a floating-point quotient rather than from sympy's Rational, slipping off by one on the roughly six NCC matrices where the optimal cycle mean lies within 1e-12 of an integer; (2) facet-coverage collapse — under context pressure across 24 matrices and four reasoning modes the agent silently skips the cyclicity column on the four largest matrices (n=8) where Johnson's elementary-circuit enumeration costs the most working memory, replacing the cyclicity entries with the placeholder 0 (which is the documented acyclic sentinel and so passes the type and interval gates but lands as wrong_value at the gold integer); (3) critical-subgraph extraction drift — the critical graph requires arcs (j,k) with rescaled weight zero that participate in at least one zero-weight cycle; a single agent at sustained context pressure conflates the simpler 'all zero-weight arcs after rescale' set with the proper critical subgraph, over-counting the critical_arc_count atom on roughly five RED-family matrices that have zero-weight arcs outside the strongly-connected critical component; (4) Kleene-star truncation drift — the closure series stabilises within n-1 steps when lambda(A) >= 0 but a single agent at this volume sometimes truncates at depth n rather than 2n-1 and misses the closure entries that materialise only on the second n-step pass through a long induced cycle, under-counting kleene_finite_count by 2 to 4 on the longer-cycle PRI matrices. The 24-matrix scale lifts these four failure modes from edge cases to dominant cost centres: empirically, a strong single agent lands in the 0.55-to-0.70 reward band on a 108-atom fingerprint sweep at this corpus profile, against a multi-agent reward in the 0.86-to-0.93 band, a gap of roughly 0.20 to 0.25. The map-reduce coordination pattern partitions the work not by matrix subset but by FINGERPRINT FACET: four facet-specific mapper sub-agents each receive the full 24-matrix corpus and each commits to ONE column block of the fingerprint table independently of the others. The lambda mapper owns lambda_floor (with the sympy.Rational floor discipline on every matrix); the closure mapper owns kleene_finite_count (with the depth-2n-1 truncation discipline on every matrix); the cyclicity mapper owns sigma (with the rescale-then-extract-zero-weight-cycle-supports discipline on every matrix); the critical-arc mapper owns critical_arc_count (with the supports-of-zero-weight-cycles-only discipline on every matrix). The reducer never re-computes any column — it merges the four columns into the per-matrix four-tuples, partitions by family token from the matrix id, and runs the trivial per-family associative tallies (count, sum_lambda_floor, max_kleene_finite_count, sum_critical_arc_count) over the assembled fingerprints. Facet-partitioning isolates the four distinct numerical and combinatorial risks rather than smearing them across mappers, removes the facet-coverage collapse failure mode (a mapper that only computes one facet cannot silently skip it), and reduces the per-mapper reasoning surface to a single mode rather than four. Total: 4 mappers + 1 reducer = exactly 5 Agent calls; the mappers fan out in a single parallel wave with no further sub-agent nesting permitted at any level."""
reference_link = "https://en.wikipedia.org/wiki/Tropical_semiring"

[agent]
# AGENTS.md rule: never 1800. Use 3600 (60 min) for normal tasks, 5400 (90 min)
# for heavy corpora. Single and multi MUST share the same timeout (QD-10 Check 2).
timeout_sec = 3600

[verifier]
timeout_sec = 300

[environment]
cpus = 2
memory_mb = 4096
build_timeout_sec = 600
