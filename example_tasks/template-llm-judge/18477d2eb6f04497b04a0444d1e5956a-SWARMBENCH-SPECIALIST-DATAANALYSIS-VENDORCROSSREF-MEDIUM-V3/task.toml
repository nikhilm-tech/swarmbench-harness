[task]
name = "swarmbench/18477d2eb6f04497b04a0444d1e5956a-SWARMBENCH-SPECIALIST-DATAANALYSIS-VENDORCROSSREF-MEDIUM-V3"
description = "Vendor cross-reference analysis: detect contradictions across 10 vendor reports spanning financial, technical, security, and market domains"

[metadata]
verifier_type = "llm-judge"
domain = "data-analysis"
coordination_pattern = "specialist-routing"
human_solving_hours_estimate = 14.0
human_solving_hours_justification = "Requires reading all 10 vendor reports (~33K tokens), manually tracking contradictions across 4 domains with strict boundary rules, and producing a structured cross-reference report. ~2h per domain (8h total) + ~6h for synthesis, deduplication, and verification."
estimated_sub_agents = 5
input_token_estimate = 33000
reference_link = "synthetic"
why_multi_agent ="10 vendor reports totaling ~33K tokens of dense analytical prose require cross-document contradiction detection across 4 distinct domains (financial, technical, security, market). Four specialist sub-agents each focus on exactly one domain, reading all 10 reports but extracting only domain-relevant claims. This isolation ensures each specialist applies its domain's strict boundary rules without cross-domain attention dilution — for example, the security specialist correctly classifies encryption key management disputes as security while the technical specialist handles encryption algorithm disputes, a distinction that confuses a single generalist agent. The orchestrator then merges the four specialists' outputs, deduplicates any edge cases, and computes the summary. A single agent must simultaneously track 25 contradictions buried among 8+ red herrings across C(10,2)=45 pairwise comparisons while maintaining 4 sets of domain boundary rules over ~33K tokens. At this input size, single-agent attention degrades significantly — it misses subtle contradictions, misclassifies domain boundaries, and produces cascading summary errors. Four isolated domain specialists eliminate this attention competition, each maintaining focused context for their ~6 domain-specific contradictions."

[agent]
timeout_sec = 3600

[verifier]
timeout_sec = 600
# FIREWORKS_API_KEY passed via --ve flag at run time

[environment]
cpus = 2
memory_mb = 4096
build_timeout_sec = 600
