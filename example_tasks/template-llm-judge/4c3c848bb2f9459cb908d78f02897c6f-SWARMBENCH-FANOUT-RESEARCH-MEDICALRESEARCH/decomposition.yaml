  - depends_on:
      - cardiac-chunk-1
      - cardiac-chunk-2
      - cardiac-chunk-3
      - cardiac-chunk-4
      - cardiac-chunk-5
    description:
      "Merge reports from cardiac-chunk-1 through cardiac-chunk-5. Produce:
      total_cases, relevant_count, partially_relevant_count, all_relevant_pmcids, top_10_cases
      with verbatim excerpts, candidate_diagnosis_assessment, domain_conclusion. Pay
      special attention to cases involving intramural or intramyocardial haematoma/hematoma,
      coronary dissection, or contained perforation — these represent specific post-PCI
      mechanisms that can explain tamponade-like physiology WITHOUT pericardial effusion."
    id: synthesize-cardiac
    parallel_group: phase2-domain-synthesis
  - depends_on:
      - vascular-chunk-1
      - vascular-chunk-2
      - vascular-chunk-3
      - vascular-chunk-4
      - vascular-chunk-5
    description:
      "Merge reports from vascular-chunk-1 through vascular-chunk-5. Same
      output structure as cardiac synthesizer. Note: vascular cases involving retroperitoneal
      bleeding or femoral pseudoaneurysms may show similar hemodynamic patterns to the
      patient case, but evaluate whether these cases truly match ALL findings (especially:
      no access-site bleeding on femoral angiography, tamponade physiology with elevated
      venous pressures)."
    id: synthesize-vascular
    parallel_group: phase2-domain-synthesis
  - depends_on:
      - systemic-chunk-1
      - systemic-chunk-2
      - systemic-chunk-3
      - systemic-chunk-4
      - systemic-chunk-5
    description:
      Merge reports from systemic-chunk-1 through systemic-chunk-5. Same
      output structure as cardiac synthesizer. Focus on whether systemic causes can
      explain the combination of hemoglobin drop AND tamponade-like physiology without
      effusion.
    id: synthesize-systemic
    parallel_group: phase2-domain-synthesis
  - depends_on:
      - synthesize-cardiac
      - synthesize-vascular
      - synthesize-systemic
    description:
      "Collect domain synthesis reports from synthesize-cardiac, synthesize-vascular,
      synthesize-systemic. CRITICAL SYNTHESIS GUIDANCE: (1) The patient had a CARDIAC
      procedure (PCI) — cardiac domain evidence for specific post-procedural mechanisms
      should receive higher diagnostic weight than general pattern matches from other
      domains. (2) For each candidate diagnosis, verify it explains ALL clinical findings:
      post-PCI hypotension, tamponade-like physiology WITHOUT pericardial effusion,
      hemoglobin drop, no coronary perforation on angiography, no access-site bleeding
      on femoral angiography. A diagnosis that explains only SOME findings (e.g. retroperitoneal
      hemorrhage explains hemoglobin drop but not the tamponade physiology with elevated
      venous pressures and no effusion) should be ranked lower than one that explains
      ALL findings. (3) Volume of evidence does not equal diagnostic accuracy — many
      vascular cases with similar hemodynamic patterns does not make a vascular diagnosis
      more likely if the mechanism doesn't match the specific clinical findings. Write
      /logs/agent/output.json with ALL 14 fields including verbatim excerpts."
    id: final-synthesis
    parallel_group: phase3-final
