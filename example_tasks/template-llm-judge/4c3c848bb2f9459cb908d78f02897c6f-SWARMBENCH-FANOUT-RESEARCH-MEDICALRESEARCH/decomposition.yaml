      ReadFile. Clinically assess each case for relevance. For RELEVANT cases include
      verbatim excerpt (first 150 chars of case_summary). Report: chunk_range, cases_in_chunk,
      relevant_cases with PMCIDs and excerpts, partially_relevant PMCIDs, candidate_diagnosis_notes.
      IMPORTANT: If ReadFile truncates before the end of your assigned range, make additional
      ReadFile calls to continue from where you left off until you reach the end of
      your range. You MUST cover every line in your assigned range — report the exact
      line range you actually read."
